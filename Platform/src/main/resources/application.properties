spring.application.name=Platform

management.datadog.metrics.export.enabled=false

spring.autoconfigure.exclude=\
  org.springframework.ai.vectorstore.redis.autoconfigure.RedisVectorStoreAutoConfiguration

# Postgres + JPA
spring.datasource.url=jdbc:postgresql://localhost:5432/uhack
spring.datasource.username=uhack
spring.datasource.password=uhack
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server: gzip + http2 + virtual threads (Java 21) — keep SSE bandwidth low and
# avoid blocking MVC threads on long-lived connections.
server.compression.enabled=true
server.compression.mime-types=application/json,text/event-stream
server.compression.min-response-size=1024
server.http2.enabled=true
spring.threads.virtual.enabled=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=1
spring.kafka.consumer.group-id=spring-dashboard
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Wyscout ingestion
wyscout.api.url=http://localhost:5001/events
wyscout.poll.interval-ms=5000
wyscout.kafka.topic=wyscout-events
wyscout.dedup.ttl-seconds=3600

# Insight topics produced by ai-service (consumed by Platform)
insights.topic.passing-network=insights-passing-network
insights.topic.pressing=insights-pressing
insights.topic.ball-losses=insights-ball-losses
insights.topic.line-breaks=insights-line-breaks
insights.topic.player-profile=insights-player-profile

# Analysis topics produced post-match by DQ + TI (consumed by Platform)
analysis.topic.decision-quality=analysis-decision-quality
analysis.topic.tactical-intelligence=analysis-tactical-intelligence

# Match-end coordination
matches.topic.lifecycle=match-lifecycle

# Downstream service URLs (used by Platform to dispatch full match on match-end)
ai-decision-quality.url=http://localhost:8002
ai-tactical-intelligence.url=http://localhost:8003
tactical-fusion.url=http://localhost:8005

# RAG indexing service. After each post-match analysis report lands, Platform
# rebuilds the match RAG index from stored reports plus the latest live insight
# snapshots cached in Redis.
rag-service.enabled=true
rag-service.url=http://localhost:8004

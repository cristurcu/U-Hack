spring.application.name=Platform

management.datadog.metrics.export.enabled=false

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.ai.vectorstore.redis.autoconfigure.RedisVectorStoreAutoConfiguration

# Server: gzip + http2 + virtual threads (Java 21) — keep SSE bandwidth low and
# avoid blocking MVC threads on long-lived connections.
server.compression.enabled=true
server.compression.mime-types=application/json,text/event-stream
server.compression.min-response-size=1024
server.http2.enabled=true
spring.threads.virtual.enabled=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=1
spring.kafka.consumer.group-id=spring-dashboard
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Wyscout ingestion
wyscout.api.url=http://localhost:5001/events
wyscout.poll.interval-ms=5000
wyscout.kafka.topic=wyscout-events
wyscout.dedup.ttl-seconds=3600

# Dashboard topics + downstream URLs
dashboard.topic.match-stats=match-stats
dashboard.topic.event-scores=event-scores
dashboard.topic.passing-network=passing-network
dashboard.topic.pressing-stats=pressing-stats

dashboard.stats.url=http://localhost:8000
dashboard.ai-service.url=http://localhost:8001
